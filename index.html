<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Turmalinas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .header-blue { background: linear-gradient(135deg, #22a6b3 0%, #1b8a94 100%); color: white; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; box-sizing: border-box; }
        .btn-login { width: 100%; background: #22a6b3; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-login:hover { background: #1b8a94; }
        .footer-links { margin-top: 20px; font-size: 13px; color: #64748b; }
        .footer-links a { color: #22a6b3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="header-blue">
            <h2 style="margin:0;">💎 Login</h2>
            <p style="margin:5px 0 0 0; font-size: 12px; opacity: 0.9;">Condomínio Turmalinas</p>
        </div>
        
        <input type="email" id="email" placeholder="Seu E-mail (Login)">
        <input type="password" id="senha" placeholder="Sua Senha">
        
        <button class="btn-login" onclick="fazerLogin()" id="btnLogin">Entrar no Painel</button>
        
        <div class="footer-links">
            Ainda não tem acesso? <a href="cadastro.html">Cadastre-se aqui</a>
        </div>
    </div>

    <script>
        const _supabaseUrl = 'https://fmluskuoyzgnzbxsllum.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtbHVza3VveXpnbnpieHNsbHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDI4MzEsImV4cCI6MjA4OTA3ODgzMX0.uGzuqE4y3_wkZNPJmNFnSSUnjDcEJaeuJjGBsT0z1UQ';
        const db = supabase.createClient(_supabaseUrl, _supabaseKey);

        // LOGICA INICIAL: Se já estiver logado, vai direto para o painel
        if (localStorage.getItem('turmalinas_logado') === 'true') {
            window.location.replace('painel.html');
        }

        async function fazerLogin() {
            const emailInput = document.getElementById('email').value.trim();
            const senhaInput = document.getElementById('senha').value;
            const btn = document.getElementById('btnLogin');

            if (!emailInput || !senhaInput) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            btn.innerText = "Verificando...";
            btn.disabled = true;

            try {
                const { data, error } = await db.from('moradores')
                    .select('*')
                    .eq('email', emailInput)
                    .maybeSingle();

                if (error) throw error;

                if (!data) {
                    alert("E-mail não cadastrado!");
                } else if (senhaInput === data.senha) {
                    localStorage.setItem('turmalinas_logado', 'true');
                    localStorage.setItem('usuario_nome', data.Moradores);
                    window.location.replace('painel.html'); 
                } else {
                    alert("Senha incorreta!");
                }
            } catch (err) {
                alert("Erro ao conectar: " + err.message);
            } finally {
                btn.innerText = "Entrar no Painel";
                btn.disabled = false;
            }
        }
        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') fazerLogin(); });
    </script>
</body>
</html>
