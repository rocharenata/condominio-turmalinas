<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turmalinas - Orçamentos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 0 10px 20px 10px; }
        
        /* CABEÇALHO MODERNO */
        .header-container { 
            background: linear-gradient(135deg, #22a6b3 0%, #1b8a94 100%); 
            width: 100%; padding: 30px 0 0 0; border-radius: 0 0 30px 30px; 
            box-shadow: 0 10px 30px rgba(27, 138, 148, 0.3); margin-bottom: 30px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header-content { width: 95%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; color: white; padding-bottom: 25px; }
        .nav-tabs { width: 95%; max-width: 1100px; display: flex; gap: 10px; }
        .nav-tab { text-decoration: none; padding: 12px 20px; border-radius: 15px 15px 0 0; font-weight: bold; font-size: 14px; transition: 0.3s; background: rgba(255,255,255,0.1); color: white; }
        .nav-tab.active { background: white; color: #1b8a94; }

        /* PAINEL */
        #app { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 1100px; box-sizing: border-box; }
        
        /* FORMULÁRIO RESPONSIVO */
        .form-box { background: #f9f9f9; padding: 20px; border-radius: 15px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; text-align: left; border: 1px solid #edf2f7; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 14px; }
        .btn-salvar { grid-column: 1 / -1; background: #22a6b3; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }

        /* TABELA RESPONSIVA */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #22a6b3; color: white; padding: 12px; text-align: left; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; color: #333; }
        
        .btn-whatsapp { display: inline-flex; align-items: center; background-color: #25d366; color: white; text-decoration: none; padding: 7px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .insta-link { color: #e1306c; text-decoration: none; font-weight: bold; }
        .badge-apto { background: #e0f2f1; color: #00796b; padding: 3px 8px; border-radius: 6px; font-weight: bold; }

        /* MEDIA QUERY PARA CELULAR */
        @media (max-width: 768px) {
            .header-content h1 { font-size: 18px; }
            .nav-tab { padding: 10px 15px; font-size: 12px; }
            
            /* Esconde o cabeçalho da tabela no mobile */
            thead { display: none; }
            
            /* Transforma cada linha (tr) em um card */
            tr { display: block; margin-bottom: 15px; border: 1px solid #eee; border-radius: 15px; padding: 15px; background: #fdfdfd; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
            
            td { display: block; text-align: right; border: none; padding: 8px 0; position: relative; padding-left: 50%; }
            
            /* Adiciona o rótulo antes do dado no mobile */
            td::before { content: attr(data-label); position: absolute; left: 0; width: 45%; text-align: left; font-weight: bold; color: #1b8a94; font-size: 12px; text-transform: uppercase; }
            
            .btn-whatsapp { width: 100%; justify-content: center; box-sizing: border-box; }
        }

        footer { width: 100%; margin-top: 50px; padding: 40px 20px; text-align: center; color: #64748b; font-size: 14px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-content">
            <div>
                <h1 style="margin: 0; letter-spacing: 1px;">💎 TURMALINAS</h1>
                <p style="margin: 5px 0 0 0; opacity: 0.8; font-size: 13px;">Gestão Administrativa</p>
            </div>
            <div style="font-size: 24px;">💰</div>
        </div>
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab">👥 Moradores</a>
            <a href="orcamentos.html" class="nav-tab active">💰 Orçamentos</a>
        </div>
    </div>

    <div class="container">
        <div id="app">
            <div style="text-align: left; margin-bottom: 25px; border-left: 4px solid #22a6b3; padding-left: 15px;">
                <h2 style="margin:0; color: #1b8a94; font-size: 18px;">Indicações de Serviços</h2>
                <small style="color: #64748b;">Dicas dos vizinhos para sua obra ou reforma</small>
            </div>

            <div class="form-box">
                <input type="text" id="morador" placeholder="Quem indica">
                <input type="number" id="apto" placeholder="Apto">
                <input type="text" id="servico" placeholder="Serviço">
                <input type="text" id="empresa" placeholder="Empresa/Profissional">
                <input type="text" id="contato" placeholder="WhatsApp">
                <input type="text" id="rede_social" placeholder="Instagram (@)">
                <button class="btn-salvar" onclick="salvarIndicao()">Adicionar Indicação</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Indicado por</th>
                        <th>Apto</th>
                        <th>Serviço / Empresa</th>
                        <th>Contato</th>
                        <th>Rede Social</th>
                    </tr>
                </thead>
                <tbody id="listaOrcamentos">
                    <tr><td colspan="5">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const _supabaseUrl = 'https://fmluskuoyzgnzbxsllum.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtbHVza3VveXpnbnpieHNsbHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDI4MzEsImV4cCI6MjA4OTA3ODgzMX0.uGzuqE4y3_wkZNPJmNFnSSUnjDcEJaeuJjGBsT0z1UQ';
        const db = supabase.createClient(_supabaseUrl, _supabaseKey);

        async function carregarDados() {
            const { data, error } = await db.from('orcamentos').select('*').order('id', { ascending: false });
            const tbody = document.getElementById('listaOrcamentos');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5">Erro ao carregar dados.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(o => {
                const foneLimpo = o.contato ? o.contato.replace(/\D/g, '') : '';
                const linkWhats = foneLimpo ? `https://wa.me/55${foneLimpo}` : null;
                const rede = o.rede_social ? `<a href="https://instagram.com/${o.rede_social.replace('@','')}" target="_blank" class="insta-link">📸 ${o.rede_social}</a>` : '---';
                
                return `
                <tr>
                    <td data-label="Indicado por">${o.morador || '---'}</td>
                    <td data-label="Apto"><span class="badge-apto">${o.apto || '---'}</span></td>
                    <td data-label="Serviço"><strong>${o.servico || '---'}</strong><br><small>${o.empresa || ''}</small></td>
                    <td data-label="WhatsApp">${linkWhats ? `<a href="${linkWhats}" target="_blank" class="btn-whatsapp">🟢 WhatsApp</a>` : '---'}</td>
                    <td data-label="Rede Social">${rede}</td>
                </tr>`;
            }).join('') || "<tr><td colspan='5'>Nenhuma indicação.</td></tr>";
        }

        async function salvarIndicao() {
            const payload = {
                morador: document.getElementById('morador').value,
                apto: document.getElementById('apto').value,
                servico: document.getElementById('servico').value,
                empresa: document.getElementById('empresa').value,
                contato: document.getElementById('contato').value,
                rede_social: document.getElementById('rede_social').value
            };
            const { error } = await db.from('orcamentos').insert([payload]);
            if (!error) {
                document.querySelectorAll('input').forEach(i => i.value = '');
                carregarDados();
            }
        }
        carregarDados();
    </script>

    <footer>
        <p>Desenvolvido com ❤️ por <strong>Renata Rocha</strong></p>
        <div style="margin: 15px 0;">
            <a href="mailto:renatarocha95@hotmail.com" style="text-decoration:none; color:#1b8a94; border:1px solid #1b8a94; padding:5px 15px; border-radius:20px; font-size:12px;">✉️ E-mail</a>
            <a href="https://wa.me/5511978283472" target="_blank" style="text-decoration:none; margin-left:10px;">💬</a>
        </div>
        <p style="font-size: 10px; opacity: 0.6;">© 2026 CONDOMÍNIO TURMALINAS</p>
    </footer>
</body>
</html>
