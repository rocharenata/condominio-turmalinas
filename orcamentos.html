    <title>Orçamentos - Turmalinas</title>
    <link rel="stylesheet" href="style.css">

<body>
    <header>
        📋 Orçamentos e Indicações
    </header>

    <div class="container">
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Morador</th>
                        <th>Apto</th>
                        <th>Serviço</th>
                        <th>Contato</th>
                        <th>Rede Social</th>
                    </tr>
                </thead>
                <tbody id="listaOrcamentos">
                    <tr><td colspan="5">A carregar orçamentos...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h3>Indicar Serviço</h3>
            <form id="formOrcamento">
                <input type="text" id="morador" placeholder="Teu Nome" required>
                <input type="number" id="apto" placeholder="Teu Apartamento" required>
                <input type="text" id="servico" placeholder="Empresa / Serviço Sugerido" required>
                <input type="text" id="contato" placeholder="Telefone / WhatsApp">
                <input type="text" id="rede_social" placeholder="Instagram ou Link">
                
                <button type="submit" class="submit">Adicionar Indicação</button>
            </form>
        </div>

        <a class="link" href="index.html">← Voltar para Moradores</a>
    </div>
