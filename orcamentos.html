<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turmalinas - Orçamentos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 10px 40px 10px; }
        
        /* HEADER */
        .header-container { 
            background: linear-gradient(135deg, #22a6b3 0%, #1b8a94 100%); 
            width: 100%; padding: 30px 0 0 0; border-radius: 0 0 30px 30px; 
            box-shadow: 0 10px 30px rgba(27, 138, 148, 0.3); margin-bottom: 30px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header-content { width: 95%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; color: white; padding-bottom: 25px; }
        .nav-tabs { width: 95%; max-width: 1100px; display: flex; gap: 10px; }
        .nav-tab { text-decoration: none; padding: 12px 20px; border-radius: 15px 15px 0 0; font-weight: bold; font-size: 14px; transition: 0.3s; background: rgba(255,255,255,0.1); color: white; }
        .nav-tab.active { background: #f4f7f6; color: #1b8a94; }

        /* PAINEL */
        #app { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 1100px; box-sizing: border-box; }
        
        /* FORMULÁRIO */
        .form-box { background: #f9f9f9; padding: 20px; border-radius: 15px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; text-align: left; border: 1px solid #edf2f7; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; font-weight: bold; color: #64748b; margin-bottom: 5px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .btn-salvar { grid-column: 1 / -1; background: #22a6b3; color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-salvar:hover { background: #1b8a94; }

        /* TABELA */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #22a6b3; color: white; padding: 12px; text-align: left; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; color: #333; }
        
        /* LOCALIZAÇÃO */
        .location-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .chip-torre { background: #0f172a; color: white; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; width: fit-content; text-transform: uppercase; }
        .chip-apto { background: #e0f2f1; color: #00796b; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; width: fit-content; }

        /* CONTATOS TABELA */
        .social-links { display: flex; gap: 8px; }
        .btn-contact { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 18px; transition: 0.3s; border: none; cursor: pointer; }
        .btn-whats { background: #dcfce7; color: #25d366; }
        .btn-insta { background: #fce7f3; color: #e1306c; }
        .btn-share { background: #e0f2fe; color: #0ea5e9; }
        .btn-contact:hover { transform: scale(1.1); filter: brightness(0.9); }

        /* RESPONSIVIDADE (MOBILE) */
        @media (max-width: 768px) {
            thead { display: none; }
            tr { display: block; margin-bottom: 20px; border: 1px solid #edf2f7; border-radius: 15px; padding: 15px; background: #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
            td { display: flex; justify-content: space-between; border: none; padding: 10px 0; align-items: center; }
            td[data-label="Serviço"] { display: block; background: #f8fafc; margin: 10px -15px; padding: 15px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
            td::before { content: attr(data-label); font-weight: bold; color: #1b8a94; font-size: 11px; text-transform: uppercase; }
            .location-wrapper { align-items: flex-end; }
        }

        /* ESTILO DO FOOTER PERSONALIZADO */
        .dev-footer {
            background: #f8fafc;
            padding: 40px 20px;
            text-align: center;
            width: 100%;
            margin-top: 50px;
            border-top: 1px solid #edf2f7;
        }
        .dev-text { font-size: 12px; color: #94a3b8; margin-bottom: 10px; letter-spacing: 0.5px; }
        .dev-text b { color: #1b8a94; font-weight: 700; }
        .dev-contacts { display: flex; justify-content: center; gap: 20px; }
        .dev-contacts a { text-decoration: none; color: #1b8a94; font-size: 18px; transition: 0.3s; opacity: 0.7; }
        .dev-contacts a:hover { opacity: 1; transform: translateY(-3px); color: #22a6b3; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-content">
            <div>
                <h1 style="margin: 0; letter-spacing: 1px;">💎 TURMALINAS</h1>
                <p style="margin: 5px 0 0 0; opacity: 0.8; font-size: 13px;">Gestão Administrativa</p>
            </div>
            <div style="font-size: 24px;">💰</div>
        </div>
        <div class="nav-tabs">
            <a href="painel.html" class="nav-tab">👥 Moradores</a>
            <a href="orcamentos.html" class="nav-tab active">💰 Orçamentos</a>
        </div>
    </div>

    <div class="container">
        <div id="app">
            <div style="text-align: left; margin-bottom: 25px; border-left: 4px solid #22a6b3; padding-left: 15px;">
                <h2 style="margin:0; color: #1b8a94; font-size: 18px;">Indicações de Serviços</h2>
                <p style="color: #64748b; margin: 5px 0;">Dicas dos vizinhos para sua obra ou reforma</p>
            </div>

            <div class="form-box">
                <div class="input-group"><label>Quem indica</label><input type="text" id="morador" placeholder="Seu nome"></div>
                <div class="input-group">
                    <label>Torre</label>
                    <select id="torre">
                        <option value="Torre 1">Torre 1</option>
                        <option value="Torre 2">Torre 2</option>
                        <option value="Torre 3">Torre 3</option>
                    </select>
                </div>
                <div class="input-group"><label>Apto</label><input type="number" id="apto" placeholder="Nº"></div>
                <div class="input-group"><label>Serviço</label><input type="text" id="servico" placeholder="Ex: Pintura, Gesso..."></div>
                <div class="input-group"><label>Profissional</label><input type="text" id="empresa" placeholder="Nome do prestador"></div>
                <div class="input-group"><label>WhatsApp</label><input type="text" id="contato" placeholder="11999999999"></div>
                <div class="input-group"><label>Instagram</label><input type="text" id="rede_social" placeholder="@perfil"></div>
                <button class="btn-salvar" onclick="salvarIndicao()">Adicionar Indicação</button>
            </div>

            <div class="table-container" style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Indicado por</th>
                            <th>Localização</th>
                            <th>Serviço / Prestador</th>
                            <th>Contatos</th>
                        </tr>
                    </thead>
                    <tbody id="listaOrcamentos">
                        <tr><td colspan="4" style="text-align:center; padding: 20px;">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="dev-footer">
        <div class="dev-text">Desenvolvido por <b>Renata Rocha</b></div>
        <div class="dev-contacts">
            <a href="https://wa.me/5511978283472" target="_blank" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <a href="mailto:renatarocha95@hotmail.com" title="E-mail"><i class="fas fa-envelope"></i></a>
        </div>
    </footer>

    <script>
        const _supabaseUrl = 'https://fmluskuoyzgnzbxsllum.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtbHVza3VveXpnbnpieHNsbHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDI4MzEsImV4cCI6MjA4OTA3ODgzMX0.uGzuqE4y3_wkZNPJmNFnSSUnjDcEJaeuJjGBsT0z1UQ';
        const db = supabase.createClient(_supabaseUrl, _supabaseKey);

        async function carregarDados() {
            const { data, error } = await db.from('orcamentos').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('listaOrcamentos');
            if (error) { tbody.innerHTML = `<tr><td colspan="4">Erro ao carregar dados.</td></tr>`; return; }

            tbody.innerHTML = data.map(o => {
                const foneLimpo = o.contato ? o.contato.replace(/\D/g, '') : '';
                const linkWhats = foneLimpo ? `https://wa.me/55${foneLimpo}` : null;
                const linkInsta = o.rede_social ? `https://instagram.com/${o.rede_social.replace('@','')}` : null;
                
                // Preparar dados para o compartilhamento
                const dadosParaCompartilhar = JSON.stringify({
                    servico: o.servico,
                    empresa: o.empresa,
                    contato: o.contato
                }).replace(/"/g, '&quot;');

                return `
                <tr>
                    <td data-label="Indicado por">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="width: 28px; height: 28px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #64748b;"><i class="fas fa-user"></i></div>
                            <strong>${o.morador || '---'}</strong>
                        </div>
                    </td>
                    <td data-label="Localização">
                        <div class="location-wrapper">
                            <span class="chip-torre">${o.torre || 'Torre --'}</span>
                            <span class="chip-apto">Apto ${o.apto || '---'}</span>
                        </div>
                    </td>
                    <td data-label="Serviço">
                        <div class="service-content-mobile">
                            <span style="color:#1b8a94; font-weight:800; font-size:16px; display:block; line-height:1.2;">${o.servico || '---'}</span>
                            <small style="color:#64748b; font-weight:600;"><i class="fas fa-tools" style="font-size:10px; opacity:0.5;"></i> ${o.empresa || 'Profissional'}</small>
                        </div>
                    </td>
                    <td data-label="Contatos">
                        <div class="social-links">
                            ${linkWhats ? `<a href="${linkWhats}" target="_blank" class="btn-contact btn-whats" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>` : ''}
                            ${linkInsta ? `<a href="${linkInsta}" target="_blank" class="btn-contact btn-insta" title="Instagram"><i class="fab fa-instagram"></i></a>` : ''}
                            <button onclick="compartilharIndicacao('${o.servico}', '${o.empresa}', '${o.contato}')" class="btn-contact btn-share" title="Compartilhar">
                                <i class="fas fa-share-nodes"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('') || "<tr><td colspan='4' style='text-align:center;'>Nenhuma indicação cadastrada.</td></tr>";
        }

        // FUNÇÃO DE COMPARTILHAMENTO
        function compartilharIndicacao(servico, empresa, contato) {
            const texto = `💎 *Indicação Turmalinas*\n\n🛠 *Serviço:* ${servico}\n👤 *Profissional:* ${empresa}\n📞 *Contato:* ${contato}\n\n_Dica enviada através do nosso Painel Administrativo!_`;

            if (navigator.share) {
                navigator.share({
                    title: 'Indicação de Serviço - Turmalinas',
                    text: texto,
                    url: window.location.href
                }).catch(console.error);
            } else {
                // Fallback para quem não tem a API de compartilhamento (ex: browsers antigos)
                const urlWhats = `https://wa.me/?text=${encodeURIComponent(texto)}`;
                window.open(urlWhats, '_blank');
            }
        }

        async function salvarIndicao() {
            const btn = document.querySelector('.btn-salvar');
            btn.innerText = "Publicando...";
            btn.disabled = true;
            const payload = {
                morador: document.getElementById('morador').value,
                torre: document.getElementById('torre').value,
                apto: document.getElementById('apto').value,
                servico: document.getElementById('servico').value,
                empresa: document.getElementById('empresa').value,
                contato: document.getElementById('contato').value,
                rede_social: document.getElementById('rede_social').value
            };
            const { error } = await db.from('orcamentos').insert([payload]);
            if (!error) {
                alert("Indicação publicada com sucesso! 💎");
                document.querySelectorAll('input').forEach(i => i.value = '');
                carregarDados();
            } else { alert("Erro: " + error.message); }
            btn.innerText = "Adicionar Indicação"; btn.disabled = false;
        }
        carregarDados();
    </script>
</body>
</html>
