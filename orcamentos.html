<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turmalinas - Orçamentos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #22a6b3;
            --primary-dark: #1b8a94;
            --primary-light: #e0f7f9;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #25d366;
            --insta: #e1306c;
            --radius: 20px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); margin: 0; color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh;
        }
        
        /* HEADER */
        .header-container { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); 
            width: 100%; padding: 30px 0 0 0; border-radius: 0 0 40px 40px; 
            box-shadow: 0 10px 25px rgba(27, 138, 148, 0.2); margin-bottom: 30px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .header-content { width: 92%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; color: white; padding-bottom: 25px; }
        .header-content h1 { font-size: 24px; font-weight: 800; margin: 0; }
        
        .nav-tabs { width: 92%; max-width: 1100px; display: flex; gap: 10px; }
        .nav-tab { text-decoration: none; padding: 14px 24px; border-radius: 16px 16px 0 0; font-weight: 700; font-size: 14px; background: rgba(255,255,255,0.1); color: white; transition: 0.3s; }
        .nav-tab.active { background: var(--bg); color: var(--primary-dark); }
        .btn-logout { background: rgba(255, 255, 255, 0.15); color: white; border: none; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 600; }

        .container { flex: 1; width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px 50px 20px; box-sizing: border-box; }

        /* FORMULÁRIO */
        .form-section { background: var(--white); padding: 30px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.8); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .input-group input, .input-group select { padding: 12px 16px; border: 2px solid #f1f5f9; border-radius: 14px; outline: none; transition: 0.3s; font-size: 14px; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }
        
        .btn-add { grid-column: 1 / -1; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 12px rgba(34, 166, 179, 0.3); }
        .btn-add:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* TABELA */
        .table-container { background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: var(--text-muted); text-align: left; padding: 18px; font-size: 11px; text-transform: uppercase; font-weight: 800; border-bottom: 2px solid #f1f5f9; }
        td { padding: 20px 18px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        
        /* ESTILO NOVO DO NOME E TORRE */
        .morador-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .morador-nome { font-weight: 700; color: var(--text-main); font-size: 15px; letter-spacing: -0.3px; }
        .morador-badge { 
            display: inline-flex; align-items: center; gap: 5px;
            background: #f1f5f9; color: var(--text-muted); 
            padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600;
            width: fit-content;
        }
        .morador-badge i { color: var(--primary); font-size: 10px; }

        .servico-destaque { font-weight: 700; color: var(--primary-dark); font-size: 16px; }
        
        .contact-icons { display: flex; gap: 12px; }
        .contact-icons a, .contact-icons button { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 18px; transition: 0.3s; border: none; cursor: pointer; background: #f8fafc; }
        
        .btn-whats { color: var(--success); }
        .btn-whats:hover { background: var(--success); color: white; transform: translateY(-3px); }
        .btn-insta { color: var(--insta); }
        .btn-insta:hover { background: var(--insta); color: white; transform: translateY(-3px); }
        .btn-share { color: #3498db; }
        .btn-share:hover { background: #3498db; color: white; transform: translateY(-3px); }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            td { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-content">
            <div>
                <h1>💎 TURMALINAS</h1>
                <p id="boasVindas">Carregando...</p>
            </div>
            <button class="btn-logout" onclick="sair()">Sair 🚪</button>
        </div>
        <div class="nav-tabs">
            <a href="painel.html" class="nav-tab">👥 Moradores</a>
            <a href="orcamentos.html" class="nav-tab active">💰 Orçamentos</a>
        </div>
    </div>

    <div class="container">
        <div class="form-section">
            <div class="form-grid">
                <div class="input-group"><label>Morador (Indica)</label><input type="text" id="morador" placeholder="Seu nome"></div>
                <div class="input-group">
                    <label>Sua Torre</label>
                    <select id="torre">
                        <option value="Torre 1">Torre 1</option>
                        <option value="Torre 2">Torre 2</option>
                        <option value="Torre 3">Torre 3</option>
                    </select>
                </div>
                <div class="input-group"><label>Seu Apto</label><input type="number" id="apto" placeholder="Ex: 101"></div>
                <div class="input-group"><label>Serviço / Profissional</label><input type="text" id="servico" placeholder="Ex: Pintura - Nome do Prestador"></div>
                <div class="input-group"><label>WhatsApp Profissional</label><input type="text" id="contato" placeholder="Apenas números"></div>
                <div class="input-group"><label>Instagram Profissional</label><input type="text" id="rede_social" placeholder="Link ou @perfil"></div>
                <button class="btn-add" onclick="adicionarIndicacao()">Adicionar Indicação</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Indicado Por</th>
                        <th>Serviço / Profissional</th>
                        <th>Contatos</th>
                    </tr>
                </thead>
                <tbody id="lista-indicacoes"></tbody>
            </table>
        </div>
    </div>

    <script>
        const _supabaseUrl = 'https://fmluskuoyzgnzbxsllum.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtbHVza3VveXpnbnpieHNsbHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDI4MzEsImV4cCI6MjA4OTA3ODgzMX0.uGzuqE4y3_wkZNPJmNFnSSUnjDcEJaeuJjGBsT0z1UQ';
        const db = supabase.createClient(_supabaseUrl, _supabaseKey);

        document.getElementById('boasVindas').innerText = `Olá, ${localStorage.getItem('usuario_nome') || "Morador"}!`;

        async function buscarIndicacoes() {
            const { data, error } = await db.from('orcamentos').select('*').order('created_at', { ascending: false });
            if (error) return;
            renderizar(data);
        }

        db.channel('orc_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'orcamentos' }, buscarIndicacoes).subscribe();

        function formatarInstagram(input) {
            if (!input) return null;
            let clean = input.trim();
            if (clean.includes('instagram.com/')) return clean.startsWith('http') ? clean : `https://${clean}`;
            clean = clean.replace('@', '');
            return `https://www.instagram.com/${clean}`;
        }

        function renderizar(lista) {
            const corpo = document.getElementById('lista-indicacoes');
            window.listaGlobal = lista; 

            corpo.innerHTML = lista.map((item, index) => {
                const linkInsta = formatarInstagram(item.rede_social);
                
                return `
                <tr>
                    <td>
                        <div class="morador-wrapper">
                            <span class="morador-nome">${item.morador || '---'}</span>
                            <span class="morador-badge">
                                <i class="fas fa-map-marker-alt"></i> ${item.torre || ''} &bull; Ap ${item.apto || ''}
                            </span>
                        </div>
                    </td>
                    <td><span class="servico-destaque">${item.servico || '---'}</span></td>
                    <td>
                        <div class="contact-icons">
                            ${item.contato ? `<a href="https://wa.me/55${item.contato.replace(/\D/g,'')}" target="_blank" class="btn-whats"><i class="fab fa-whatsapp"></i></a>` : ''}
                            ${item.rede_social ? `<a href="${linkInsta}" target="_blank" class="btn-insta"><i class="fab fa-instagram"></i></a>` : ''}
                            <button onclick="prepararCompartilhamento(${index})" class="btn-share">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        async function prepararCompartilhamento(index) {
            const item = window.listaGlobal[index];
            const texto = `*Indicação Turmalinas* 💎\n\n*Serviço:* ${item.servico}\n*Contato:* ${item.contato || 'N/A'}\n*Instagram:* ${item.rede_social || 'N/A'}\n\n*Indicado por:* ${item.morador}\n*Local:* ${item.torre} - Ap ${item.apto}`;
            
            if (navigator.share) {
                try { await navigator.share({ title: 'Indicação Turmalinas', text: texto }); } 
                catch (err) { console.log('Cancelado'); }
            } else {
                navigator.clipboard.writeText(texto);
                alert('Informações copiadas!');
            }
        }

        async function adicionarIndicacao() {
            const dados = {
                morador: document.getElementById('morador').value,
                torre: document.getElementById('torre').value,
                apto: parseInt(document.getElementById('apto').value) || 0,
                servico: document.getElementById('servico').value,
                contato: document.getElementById('contato').value,
                rede_social: document.getElementById('rede_social').value
            };
            if(!dados.morador || !dados.servico) { alert("Preencha nome e serviço."); return; }
            const { error } = await db.from('orcamentos').insert([dados]);
            if (!error) {
                alert("Sucesso!");
                document.querySelectorAll('.form-grid input').forEach(el => el.value = '');
                buscarIndicacoes();
            }
        }

        function sair() { localStorage.clear(); window.location.replace('index.html'); }
        buscarIndicacoes();
    </script>
</body>
</html>
