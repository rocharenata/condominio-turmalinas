<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turmalinas - Orçamentos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #22a6b3;
            --primary-dark: #1b8a94;
            --primary-light: #e0f7f9;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #25d366;
            --insta: #e1306c;
            --radius: 20px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }
        
        /* HEADER */
        .header-container { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); width: 100%; padding: 25px 0 0 0; border-radius: 0 0 35px 35px; box-shadow: 0 10px 25px rgba(27, 138, 148, 0.2); margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .header-content { width: 92%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; color: white; padding-bottom: 20px; }
        .header-content h1 { font-size: 22px; font-weight: 800; margin: 0; }
        
        .nav-tabs { width: 92%; max-width: 1100px; display: flex; gap: 8px; }
        .nav-tab { text-decoration: none; padding: 12px 18px; border-radius: 14px 14px 0 0; font-weight: 700; font-size: 13px; background: rgba(255,255,255,0.1); color: white; transition: 0.3s; }
        .nav-tab.active { background: var(--bg); color: var(--primary-dark); }
        .btn-logout { background: rgba(255, 255, 255, 0.15); color: white; border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 12px; }

        .container { flex: 1; width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 15px 40px 15px; box-sizing: border-box; }

        /* BUSCA */
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 15px 20px 15px 50px; border-radius: 16px; border: 2px solid white; background: white; box-shadow: var(--shadow); outline: none; font-size: 15px; transition: 0.3s; box-sizing: border-box; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 17px; }

        /* FORMULÁRIO */
        .form-section { background: var(--white); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.8); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .input-group input, .input-group select { padding: 11px; border: 2px solid #f1f5f9; border-radius: 10px; outline: none; font-size: 14px; }
        
        .btn-add { grid-column: 1 / -1; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 5px; font-size: 14px; }

        /* TABELA RESPONSIVA */
        .table-container { background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: var(--text-muted); text-align: left; padding: 15px; font-size: 11px; text-transform: uppercase; font-weight: 800; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        
        .morador-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .morador-nome { font-weight: 700; color: #2c3e50; font-size: 14px; }
        .morador-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--primary-light); color: var(--primary-dark); padding: 3px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; width: fit-content; }
        
        .servico-destaque { font-weight: 700; color: var(--primary-dark); font-size: 15px; }

        .contact-icons { display: flex; gap: 8px; }
        .contact-icons a, .contact-icons button { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 17px; transition: 0.3s; border: none; cursor: pointer; }
        
        .btn-whats { background-color: #e8fbf1; color: var(--success); }
        .btn-insta { background-color: #fce8f0; color: var(--insta); }
        .btn-share { background-color: #eaf6fe; color: #3498db; }

        /* REGRAS PARA CELULAR (MOBILE) */
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { margin-bottom: 15px; border: 1px solid #eee; border-radius: 18px; padding: 10px; background: white; }
            td { border: none; position: relative; padding: 8px 10px; }
            
            .morador-wrapper { flex-direction: row; align-items: center; justify-content: space-between; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 5px; }
            .servico-destaque { font-size: 17px; display: block; margin: 5px 0; }
            .contact-icons { justify-content: flex-end; margin-top: 10px; gap: 12px; }
            .contact-icons a, .contact-icons button { width: 45px; height: 45px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-content">
            <div>
                <h1>💎 TURMALINAS</h1>
                <p id="boasVindas" style="margin: 3px 0 0 0; opacity: 0.8; font-size: 12px;">Olá!</p>
            </div>
            <button class="btn-logout" onclick="sair()">Sair 🚪</button>
        </div>
        <div class="nav-tabs">
            <a href="painel.html" class="nav-tab">👥 Moradores</a>
            <a href="orcamentos.html" class="nav-tab active">💰 Orçamentos</a>
        </div>
    </div>

    <div class="container">
        
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="inputBusca" placeholder="Pesquisar serviço ou morador..." onkeyup="filtrarTabela()">
        </div>

        <div class="form-section">
            <div class="form-grid">
                <div class="input-group"><label>Morador (Indica)</label><input type="text" id="morador" placeholder="Seu nome"></div>
                <div class="input-group">
                    <label>Sua Torre</label>
                    <select id="torre">
                        <option value="Torre 1">Torre 1</option>
                        <option value="Torre 2">Torre 2</option>
                        <option value="Torre 3">Torre 3</option>
                    </select>
                </div>
                <div class="input-group"><label>Seu Apto</label><input type="number" id="apto" placeholder="Ex: 101"></div>
                <div class="input-group"><label>Serviço / Profissional</label><input type="text" id="servico" placeholder="Pintura - Nome"></div>
                <div class="input-group"><label>WhatsApp</label><input type="text" id="contato" placeholder="Apenas números"></div>
                <div class="input-group"><label>Instagram</label><input type="text" id="rede_social" placeholder="@perfil"></div>
                <button class="btn-add" onclick="adicionarIndicacao()">Adicionar Indicação</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Indicado Por</th>
                        <th>Serviço / Profissional</th>
                        <th>Contatos</th>
                    </tr>
                </thead>
                <tbody id="lista-indicacoes"></tbody>
            </table>
        </div>
    </div>

    <script>
        const _supabaseUrl = 'https://fmluskuoyzgnzbxsllum.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtbHVza3VveXpnbnpieHNsbHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDI4MzEsImV4cCI6MjA4OTA3ODgzMX0.uGzuqE4y3_wkZNPJmNFnSSUnjDcEJaeuJjGBsT0z1UQ';
        const db = supabase.createClient(_supabaseUrl, _supabaseKey);

        let todasIndicacoes = [];

        async function buscarIndicacoes() {
            const { data, error } = await db.from('orcamentos').select('*').order('created_at', { ascending: false });
            if (!error) {
                todasIndicacoes = data;
                renderizar(data);
            }
        }

        db.channel('orc_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'orcamentos' }, buscarIndicacoes).subscribe();

        function formatarInstagram(input) {
            if (!input) return null;
            let clean = input.trim();
            if (clean.includes('instagram.com/')) return clean.startsWith('http') ? clean : `https://${clean}`;
            clean = clean.replace('@', '');
            return `https://www.instagram.com/${clean}`;
        }

        function renderizar(lista) {
            const corpo = document.getElementById('lista-indicacoes');
            corpo.innerHTML = lista.map((item, index) => {
                const linkInsta = formatarInstagram(item.rede_social);
                return `
                <tr>
                    <td>
                        <div class="morador-wrapper">
                            <span class="morador-nome">${item.morador || '---'}</span>
                            <span class="morador-badge"><i class="fas fa-map-marker-alt"></i> ${item.torre || ''} - ${item.apto || ''}</span>
                        </div>
                    </td>
                    <td><span class="servico-destaque">${item.servico || '---'}</span></td>
                    <td>
                        <div class="contact-icons">
                            ${item.contato ? `<a href="https://wa.me/55${item.contato.replace(/\D/g,'')}" target="_blank" class="btn-whats"><i class="fab fa-whatsapp"></i></a>` : ''}
                            ${item.rede_social ? `<a href="${linkInsta}" target="_blank" class="btn-insta"><i class="fab fa-instagram"></i></a>` : ''}
                            <button onclick="prepararCompartilhamento(${index})" class="btn-share">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function filtrarTabela() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const filtrados = todasIndicacoes.filter(i => 
                (i.servico && i.servico.toLowerCase().includes(termo)) || 
                (i.morador && i.morador.toLowerCase().includes(termo))
            );
            renderizar(filtrados);
        }

        async function prepararCompartilhamento(index) {
            const item = todasIndicacoes[index];
            const texto = `*Indicação Turmalinas* 💎\n\n*Serviço:* ${item.servico}\n*Contato:* ${item.contato || 'N/A'}\n*Instagram:* ${item.rede_social || 'N/A'}\n\n*Indicado por:* ${item.morador}\n*Local:* ${item.torre} - Ap ${item.apto}`;
            if (navigator.share) {
                try { await navigator.share({ title: 'Indicação Turmalinas', text: texto }); } 
                catch (err) { console.log('Cancelado'); }
            } else {
                navigator.clipboard.writeText(texto);
                alert('Copiado para colar no WhatsApp!');
            }
        }

        async function adicionarIndicacao() {
            const dados = {
                morador: document.getElementById('morador').value,
                torre: document.getElementById('torre').value,
                apto: parseInt(document.getElementById('apto').value) || 0,
                servico: document.getElementById('servico').value,
                contato: document.getElementById('contato').value,
                rede_social: document.getElementById('rede_social').value
            };
            if(!dados.morador || !dados.servico) return alert("Preencha nome e serviço.");
            const { error } = await db.from('orcamentos').insert([dados]);
            if (!error) {
                alert("Indicação adicionada!");
                document.querySelectorAll('.form-grid input').forEach(el => el.value = '');
                buscarIndicacoes();
            }
        }

        function sair() { localStorage.clear(); window.location.replace('index.html'); }
        document.getElementById('boasVindas').innerText = `Olá, ${localStorage.getItem('usuario_nome') || 'Morador'}!`;
        buscarIndicacoes();
    </script>
</body>
</html>
