    <title>Moradores Turmalinas</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <header>
        💎 Moradores Turmalinas
    </header>

    <div class="container">

        <div class="torres">
            <button onclick="carregarTorre(1)">Torre 1</button>
            <button onclick="carregarTorre(2)">Torre 2</button>
            <button onclick="carregarTorre(3)">Torre 3</button>
        </div>

        <div class="card">
            <h2 id="tituloTorre">Selecione uma torre</h2>
            <table>
                <thead>
                    <tr>
                        <th>Apartamento</th>
                        <th>Moradores</th>
                    </tr>
                </thead>
                <tbody id="listaMoradores">
                    <tr>
                        <td colspan="2">Selecione uma torre para carregar os dados...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h3>Cadastrar Morador</h3>
            <form id="formMorador">
                <input type="number" id="apto" placeholder="Apartamento" required>
                <input type="text" id="morador" placeholder="Nome do morador" required>
                <button type="submit" class="submit">Cadastrar</button>
            </form>
        </div>

        <a class="link" href="orcamentos.html">📋 Ver Orçamentos</a>

    </div>
